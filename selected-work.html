<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROY EZUZ — Selected Work</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Barlow:wght@100;300;400;600&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="layout.js?v=2" defer></script>
<link rel="preload" as="image" href="images/collection/desktop version/moments.jpg">
<link rel="preload" as="image" href="images/collection/desktop version/portraits.jpg">
<link rel="preload" as="image" href="images/collection/desktop version/animals.jpg">
<link rel="preload" as="image" href="images/collection/desktop version/light&shadow.jpg">
<link rel="preload" as="image" href="images/collection/desktop version/urban_life.jpg">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM & GLOBALS
   ═══════════════════════════════════════════ */
:root {
  --bg-primary: #0a0a0a;
  --text-primary: #f0f0f2;
  --text-muted: #8a8a92;
  --accent-red: #E32119;
  --border-color: #2a2a2e;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Barlow', sans-serif;
  --condensed: 'Barlow Condensed', sans-serif;
}

body.day-mode {
  --bg-primary: #ffffff;
  --text-primary: #1a1a1a;
  --text-muted: #999999;
  --border-color: #e0e0e0;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-font-smoothing:antialiased; cursor:none; }
body {
  font-family: var(--sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  cursor: none;
  overflow-x: hidden;
  transition: background .4s ease, color .4s ease;
}

/* ═══════════════════════════════════════════
   SYNCHRONIZED FADE-IN (SUPER FAST: 0.6s)
   ═══════════════════════════════════════════ */
#webgl-canvas, 
#text-sync-container {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 5;
  pointer-events: none;
  opacity: 0; /* מתחיל שקוף */
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* זמן מקוצר לחצי */
}

#webgl-canvas.loaded, 
#text-sync-container.loaded {
  opacity: 1;
}

/* ═══════════════════════════════════════════
   TIMELINE (LEFT SIDE)
   ═══════════════════════════════════════════ */
.timeline {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 0 0 0 50px;
  pointer-events: auto;
}
.timeline-items {
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  z-index: 2;
}

.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding: 18px 0;
  cursor: none;
  position: relative;
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  opacity: 0.25;
  background: none;
  border: none;
  text-align: left;
  outline: none;
  width: 100%;
}
.timeline-item:hover { opacity: 0.6; }
.timeline-item.active { opacity: 1; }
.tl-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  margin-top: 5px;
  transition: background 0.5s, box-shadow 0.5s, transform 0.5s;
  position: relative;
}
.timeline-item.active .tl-dot {
  background: var(--accent-red);
  box-shadow: 0 0 18px rgba(227,33,25,0.6), 0 0 40px rgba(227,33,25,0.15);
  transform: scale(1.4);
}
.timeline-item.active .tl-dot::after {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(227,33,25,0.3);
  animation: dotPulse 2s ease-out infinite;
}
@keyframes dotPulse {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}
.tl-text { display: flex; flex-direction: column; gap: 4px; }
.tl-year {
  font-family: var(--condensed);
  font-weight: 500; font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--text-primary);
  line-height: 1;
  transition: color 0.4s;
}
.timeline-item.active .tl-year { color: var(--accent-red); }

/* ═══════════════════════════════════════════
   HUGE TEXT OVERLAY
   ═══════════════════════════════════════════ */
#text-sync-container {
  z-index: 10;
  will-change: transform;
}

.text-section {
  position: absolute;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.huge-title {
  font-family: var(--serif);
  font-size: clamp(3rem, 7vw, 9rem);
  font-weight: 400;
  line-height: 0.9;
  color: #fff;
  text-shadow: 0 10px 40px rgba(0,0,0,0.5);
  margin-bottom: -10px;
}

.project-meta-overlay {
  font-family: var(--sans);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.9);
  text-transform: uppercase;
  margin-bottom: 10px;
  background: rgba(0,0,0,0.2);
  padding: 5px 15px;
  border-radius: 20px;
  backdrop-filter: blur(5px);
}

/* ═══════════════════════════════════════════
   SCROLL HINT
   ═══════════════════════════════════════════ */
.scroll-hint {
  position: fixed; bottom: 3.5vh; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  z-index: 100; transition: opacity 0.6s;
}
.scroll-hint.hidden { opacity: 0; pointer-events: none; }
.scroll-hint span { font-family: var(--condensed); font-weight: 300; font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); }
.scroll-mouse { width: 22px; height: 34px; border: 1px solid var(--text-muted); border-radius: 11px; position: relative; }
.scroll-mouse::after { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 2px; height: 6px; background: var(--accent-red); border-radius: 1px; animation: wheel 2s ease-in-out infinite; }
@keyframes wheel { 0% {opacity:1; top:6px;} 50% {opacity:1; top:18px;} 80% {opacity:0; top:22px;} 100% {opacity:0; top:6px;} }

/* ═══════════════════════════════════════════
   MOBILE: Pure HTML gallery (replaces WebGL)
   ═══════════════════════════════════════════ */
.mobile-gallery { display: none; }

@media (max-width: 768px) {
  /* Hide all WebGL/desktop elements */
  #webgl-canvas,
  #text-sync-container,
  .timeline,
  .scroll-hint { display: none !important; }

  /* Plain scroll — no snap, no tricks */
  html { cursor: auto; }
  body {
    -webkit-overflow-scrolling: touch;
    height: auto !important;
    cursor: auto;
  }

  /* Mobile gallery */
  .mobile-gallery {
    display: block;
  }

  .mobile-gallery__section {
    height: 100svh;          /* svh = small viewport, never changes on iOS */
    width: 100%;
    position: relative;       /* anchor for absolute title */
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: inherit;
  }

  .mobile-gallery__image {
    width: 88vw;
    height: 70svh;            /* fixed svh — no resizing when chrome hides/shows */
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  .mobile-gallery__title {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--serif);
    font-size: clamp(2rem, 9vw, 3rem);
    font-weight: 400;
    color: #fff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.7);
    text-align: center;
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom dot indicators */
  .mobile-dots {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 100; align-items: center;
  }
  .mobile-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted); transition: background 0.4s, transform 0.4s;
  }
  .mobile-dot.active { background: var(--accent-red); transform: scale(1.4); }

  .mobile-tap-hint {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    font-family: var(--condensed); font-size: 0.5rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--text-muted); z-index: 100;
    transition: opacity 0.6s; white-space: nowrap;
  }
  .mobile-tap-hint.hidden { opacity: 0; pointer-events: none; }
}

/* Hide mobile-specific elements on desktop */
@media (min-width: 769px) {
  .mobile-dots { display: none; }
  .mobile-tap-hint { display: none; }
}

</style>
</head>
<body>

<canvas id="webgl-canvas"></canvas>

<site-nav id="nav"></site-nav>

<div class="timeline" id="timeline">
  <div class="timeline-items" id="timelineItems"></div>
</div>

<div id="text-sync-container"></div>

<div class="scroll-hint" id="scrollHint">
  <div class="scroll-mouse"></div>
  <span>Scroll to Explore</span>
</div>

<div class="mobile-gallery" id="mobileGallery"></div>
<div class="mobile-dots"></div>
<div class="mobile-tap-hint" id="mobileTapHint">TAP IMAGE TO ENTER</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ═══════════════════════════════════════════
   COLLECTION DATA
   ═══════════════════════════════════════════ */
const COLLECTIONS = [
  {
    meta: 'Street & Travel',
    title: 'Moments',
    image: 'images/collection/desktop version/moments.jpg',
    mobileImage: 'images/collection/mobile version/moments.jpg',
    url: 'moments.html'
  },
  {
    meta: 'People',
    title: 'Portraits',
    image: 'images/collection/desktop version/portraits.jpg',
    mobileImage: 'images/collection/mobile version/portraits.jpg',
    url: 'portraits.html'
  },
  {
    meta: 'Nature',
    title: 'Animals',
    image: 'images/collection/desktop version/animals.jpg',
    mobileImage: 'images/collection/mobile version/animals.jpg',
    url: 'animals.html'
  },
  {
    meta: 'Architecture',
    title: 'Light & Shadow',
    image: 'images/collection/desktop version/light&shadow.jpg',
    mobileImage: 'images/collection/mobile version/light&shadow.jpg',
    url: 'light-and-shadow.html'
  },
  {
    meta: 'City',
    title: 'Urban Life',
    image: 'images/collection/desktop version/urban_life.jpg',
    mobileImage: 'images/collection/mobile version/white_wall copy.jpg',
    url: 'urban-life.html'
  }
];

const isMobile = window.matchMedia('(max-width: 768px)').matches;

if (isMobile) {
  /* ═══════════════════════════════════════════
     MOBILE: Pure HTML/CSS gallery (no Three.js)
     ═══════════════════════════════════════════ */
  const gallery = document.getElementById('mobileGallery');
  const mobileDots = document.querySelector('.mobile-dots');
  const nav = document.getElementById('nav');

  COLLECTIONS.forEach((col, i) => {
    const section = document.createElement('a');
    section.className = 'mobile-gallery__section';
    section.href = col.url;
    section.innerHTML = `
      <img class="mobile-gallery__image" src="${col.mobileImage}" alt="${col.title}" loading="${i === 0 ? 'eager' : 'lazy'}">
      <h2 class="mobile-gallery__title">${col.title}</h2>
    `;
    gallery.appendChild(section);

    if (mobileDots) {
      const dot = document.createElement('div');
      dot.className = 'mobile-dot' + (i === 0 ? ' active' : '');
      mobileDots.appendChild(dot);
    }
  });

  let lastIdx = -1;
  window.addEventListener('scroll', () => {
    const idx = Math.min(COLLECTIONS.length - 1, Math.max(0, Math.round(window.scrollY / window.innerHeight)));

    if (window.scrollY > 50) {
      const tapHint = document.getElementById('mobileTapHint');
      if (tapHint) tapHint.classList.add('hidden');
      if (nav) nav.classList.add('solid');
    } else {
      if (nav) nav.classList.remove('solid');
    }

    if (idx !== lastIdx && mobileDots) {
      lastIdx = idx;
      mobileDots.querySelectorAll('.mobile-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    }
  }, { passive: true });

} else {
  /* ═══════════════════════════════════════════
     DESKTOP: Three.js WebGL gallery
     ═══════════════════════════════════════════ */
  document.body.style.height = `${COLLECTIONS.length * 100}vh`;

  /* ═══ DOM ELEMENTS BUILDER ═══ */
  const timelineItemsEl = document.getElementById('timelineItems');
  const textSyncContainer = document.getElementById('text-sync-container');

  COLLECTIONS.forEach((col, i) => {
    const item = document.createElement('button');
    item.className = 'timeline-item';
    item.innerHTML = `
      <div class="tl-dot"></div>
      <div class="tl-text">
        <div class="tl-year">${col.title}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
    });
    timelineItemsEl.appendChild(item);

    const textSect = document.createElement('div');
    textSect.className = 'text-section';
    textSect.style.top = `${i * 100}vh`;
    textSect.innerHTML = `
      <h2 class="huge-title">${col.title}</h2>
    `;
    textSyncContainer.appendChild(textSect);
  });

  const tlItems = document.querySelectorAll('.timeline-item');

  /* ═══ WEBGL SHADERS ═══ */
  const vertexShader = `
    uniform float uScrollVelocity;
    varying vec2 vUv;

    void main() {
      vUv = uv;
      vec3 pos = position;

      float distFromCenterY = abs(pos.y);
      pos.z += cos(vUv.x * 3.1415 - 1.57) * 0.3;
      pos.z += sin(vUv.y * 3.1415) * uScrollVelocity * 0.05;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const fragmentShader = `
    uniform sampler2D uTexture;
    uniform float uOpacity;
    uniform float uImageAspect;
    uniform float uPlaneAspect;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;

      // object-fit: cover — crop to fill plane without distortion
      if (uImageAspect > uPlaneAspect) {
        float scale = uPlaneAspect / uImageAspect;
        uv.x = (uv.x - 0.5) * scale + 0.5;
      } else {
        float scale = uImageAspect / uPlaneAspect;
        uv.y = (uv.y - 0.5) * scale + 0.5;
      }

      vec4 texColor = texture2D(uTexture, uv);
      float vig = 1.0 - smoothstep(0.5, 1.5, length(vUv - 0.5) * 1.5);
      texColor.rgb *= mix(0.8, 1.0, vig);
      texColor.rgb *= 0.8;
      gl_FragColor = vec4(texColor.rgb, uOpacity);
    }
  `;

  /* ═══ THREE.JS SETUP ═══ */
  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 6;

  const PLANE_W = 5.53;
  const PLANE_H = 3.4;
  const PLANE_GAP = 5.5;

  const geometry = new THREE.PlaneGeometry(PLANE_W, PLANE_H, 32, 32);
  const meshes = [];

  function loadColorManagedTexture(src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const aspect = img.naturalWidth / img.naturalHeight;
        const c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        const ctx = c.getContext('2d', { colorSpace: 'srgb' });
        ctx.drawImage(img, 0, 0);

        const tex = new THREE.CanvasTexture(c);
        tex.generateMipmaps = false;
        tex.minFilter = THREE.LinearFilter;
        tex.needsUpdate = true;
        resolve({ texture: tex, aspect });
      };
      img.onerror = () => resolve({ texture: new THREE.Texture(), aspect: 1.0 });
      img.src = src;
    });
  }

  const planeAspect = PLANE_W / PLANE_H;

  Promise.all(COLLECTIONS.map(col => loadColorManagedTexture(col.image))).then(results => {
    results.forEach(({ texture, aspect }) => {
      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTexture: { value: texture },
          uScrollVelocity: { value: 0.0 },
          uOpacity: { value: 1.0 },
          uImageAspect: { value: aspect },
          uPlaneAspect: { value: planeAspect }
        },
        transparent: true,
        side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.z = -0.04;
      scene.add(mesh);
      meshes.push(mesh);
    });

    setTimeout(() => {
      canvas.classList.add('loaded');
      textSyncContainer.classList.add('loaded');
    }, 50);
  });

  /* ═══ MOUSE PARALLAX TRACKING ═══ */
  let targetMouseX = 0;
  let targetMouseY = 0;
  let currentMouseX = 0;
  let currentMouseY = 0;

  window.addEventListener('mousemove', (e) => {
    targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
    targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  /* ═══ SCROLL & ANIMATION LOGIC ═══ */
  let currentScroll = 0;
  let targetScroll = 0;
  const MAX_SCROLL = COLLECTIONS.length - 1;
  const scrollHint = document.getElementById('scrollHint');
  const nav = document.getElementById('nav');

  window.addEventListener('scroll', () => {
    targetScroll = Math.max(0, Math.min(MAX_SCROLL, window.scrollY / window.innerHeight));

    if (window.scrollY > 50) {
      scrollHint.classList.add('hidden');
      if (nav) nav.classList.add('solid');
    } else {
      scrollHint.classList.remove('hidden');
      if (nav) nav.classList.remove('solid');
    }
  }, { passive: true });

  function animate() {
    requestAnimationFrame(animate);

    const velocity = targetScroll - currentScroll;
    currentScroll += velocity * 0.08;

    currentMouseX += (targetMouseX - currentMouseX) * 0.05;
    currentMouseY += (targetMouseY - currentMouseY) * 0.05;

    const textTranslateY = currentScroll * -100 + currentMouseY * -2;
    const textTranslateX = currentMouseX * -20;
    textSyncContainer.style.transform = `translateY(${textTranslateY}vh) translateX(${textTranslateX}px)`;

    const activeIndex = Math.round(currentScroll);
    tlItems.forEach((item, idx) => {
      item.classList.toggle('active', idx === activeIndex);
    });

    const shaderVelocity = targetScroll - currentScroll;

    meshes.forEach((mesh, i) => {
      mesh.position.y = (currentScroll - i) * PLANE_GAP;
      mesh.position.y += currentMouseY * 0.15;
      mesh.position.x = currentMouseX * 0.15;
      mesh.rotation.y = currentMouseX * 0.05;
      mesh.rotation.x = -currentMouseY * 0.05;

      mesh.material.uniforms.uScrollVelocity.value = shaderVelocity * 15.0;

      const distance = Math.abs(currentScroll - i);
      mesh.material.uniforms.uOpacity.value = Math.max(0, 1.0 - (distance * 0.6));
    });

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── Click/tap on canvas navigates to active collection ── */
  canvas.style.pointerEvents = 'auto';
  canvas.addEventListener('click', () => {
    const idx = Math.round(currentScroll);
    if (COLLECTIONS[idx]) {
      window.location.href = COLLECTIONS[idx].url;
    }
  });
}
</script>

<site-footer></site-footer>

</body>
</html>
