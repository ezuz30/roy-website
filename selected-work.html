<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROY EZUZ — Selected Work</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600&family=Raleway:wght@100;200;300;400;500&display=swap" rel="stylesheet">
<script src="layout.js" defer></script>
<style>
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a1a1e;
  --text-primary: #f0f0f2;
  --text-secondary: #b0b0b8;
  --text-muted: #8a8a92;
  --border-color: #2a2a2e;
  --accent-red: #E32119;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Barlow', Helvetica Neue, sans-serif;
  --condensed: 'Barlow Condensed', Helvetica Neue, sans-serif;
  --header-h: 90px;
}
body.day-mode {
  --bg-primary:#fff;--bg-secondary:#fafafa;--text-primary:#2a2a2a;
  --text-secondary:#666;--text-muted:#999;--border-color:#e0e0e0;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;cursor:none;}
body{font-family:var(--sans);background:var(--bg-primary);color:var(--text-primary);cursor:none;overflow:hidden;height:100vh;transition:background .4s ease;}

/* ═══ TOGGLE ═══ */
.mode-toggle{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:rgba(26,26,30,0.5);border:1px solid var(--border-color);cursor:none;display:flex;align-items:center;justify-content:center;z-index:1000;transition:all .3s;backdrop-filter:blur(8px);}
body.day-mode .mode-toggle{background:rgba(250,250,250,0.5);}
.mode-toggle:hover{transform:scale(1.1);border-color:var(--accent-red);}
.mode-toggle svg{width:18px;height:18px;color:var(--text-primary);}
.moon-icon{display:block;}.sun-icon{display:none;}
body.day-mode .moon-icon{display:none;}body.day-mode .sun-icon{display:block;}

/* ═══════════════════════════════════════════
   PROGRESS BAR — below header
   ═══════════════════════════════════════════ */
.progress-track {
  position: fixed;
  top: var(--header-h);
  left: 0;
  right: 0;
  height: 1px;
  background: var(--border-color);
  z-index: 999;
}

.progress-fill {
  height: 100%;
  width: 20%;
  background: var(--accent-red);
  transition: width 1.2s cubic-bezier(0.22, 0.9, 0.32, 1);
}

/* ═══════════════════════════════════════════
   SLIDE COUNTER — top left
   ═══════════════════════════════════════════ */
.slide-counter {
  position: fixed;
  top: calc(var(--header-h) + 16px);
  left: 6vw;
  z-index: 999;
  font-family: var(--condensed);
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  opacity: 0.5;
}

.slide-counter .current-num {
  color: var(--text-primary);
  opacity: 1;
  font-weight: 400;
  transition: opacity 0.3s ease;
}

/* ═══════════════════════════════════════════
   COVERFLOW STAGE
   ═══════════════════════════════════════════ */
.coverflow-stage {
  position: relative;
  width: 100vw;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1400px;
  overflow: hidden;
}

/* ─── Cards ─── */
.cf-card {
  position: absolute;
  text-decoration: none;
  display: block;
  overflow: hidden;
  transition: transform 1.6s cubic-bezier(0.22, 0.9, 0.32, 1),
              opacity 1.4s ease,
              filter 1.4s ease,
              box-shadow 1.4s ease;
  will-change: transform, opacity, filter;
  cursor: none;
}

.cf-card .image-container {
  width: 62vw;
  aspect-ratio: 3 / 2;
  overflow: hidden;
  position: relative;
}

.cf-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 1.6s cubic-bezier(0.22, 0.9, 0.32, 1);
}

/* ── Center ── */
.cf-card[data-pos="center"] {
  transform: translateX(0) scale(1) rotateY(0deg) translateZ(0);
  z-index: 10;
  opacity: 1;
  filter: brightness(1) grayscale(0%) blur(0px);
  box-shadow: 0 20px 80px rgba(0, 0, 0, 0.7);
  transition-timing-function: cubic-bezier(0.22, 0.9, 0.36, 1.02);
}

body.day-mode .cf-card[data-pos="center"] {
  box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
}

/* Adaptive bottom gradient — on all cards, gentle */
.cf-card .image-container::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 45%;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0) 0%,
    rgba(0, 0, 0, 0.15) 30%,
    rgba(0, 0, 0, 0.5) 70%,
    rgba(0, 0, 0, 0.75) 100%
  );
  z-index: 2;
  pointer-events: none;
}

body.day-mode .cf-card .image-container::before {
  background: linear-gradient(
    to bottom,
    rgba(255, 255, 255, 0) 0%,
    rgba(255, 255, 255, 0.2) 30%,
    rgba(255, 255, 255, 0.6) 70%,
    rgba(255, 255, 255, 0.85) 100%
  );
}

.cf-card[data-pos="center"]:hover img {
  transform: scale(1.03);
}

/* ── Left — barely peeking ~15% ── */
.cf-card[data-pos="left"] {
  transform: translateX(-48vw) scale(0.7) rotateY(4deg) translateZ(-120px);
  z-index: 5;
  opacity: 0.55;
  filter: brightness(0.2) grayscale(50%) blur(1.5px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  pointer-events: auto;
}

/* ── Right — barely peeking ~15% ── */
.cf-card[data-pos="right"] {
  transform: translateX(48vw) scale(0.7) rotateY(-4deg) translateZ(-120px);
  z-index: 5;
  opacity: 0.55;
  filter: brightness(0.2) grayscale(50%) blur(1.5px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  pointer-events: auto;
}

/* ── Far ── */
.cf-card[data-pos="far-left"] {
  transform: translateX(-80vw) scale(0.5) rotateY(6deg) translateZ(-200px);
  z-index: 1;
  opacity: 0;
  filter: brightness(0.1) grayscale(70%) blur(3px);
  pointer-events: none;
}

.cf-card[data-pos="far-right"] {
  transform: translateX(80vw) scale(0.5) rotateY(-6deg) translateZ(-200px);
  z-index: 1;
  opacity: 0;
  filter: brightness(0.1) grayscale(70%) blur(3px);
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   TITLE — positioned over adaptive gradient
   ═══════════════════════════════════════════ */
.cf-title-wrap {
  position: absolute;
  bottom: 3vh;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 15;
  pointer-events: none;
}

.cf-title {
  font-family: var(--condensed);
  font-weight: 600;
  font-size: clamp(3.5rem, 8vw, 7rem);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-primary);
  line-height: 0.9;
  user-select: none;
}

.cf-title-inner {
  display: inline-block;
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.cf-title-inner.fading {
  opacity: 0;
  transform: translateY(10px);
}

.cf-sub {
  display: block;
  font-family: var(--serif);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(0.8rem, 1.2vw, 1rem);
  color: var(--text-muted);
  margin-top: 1rem;
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease 0.3s, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.3s;
}

.cf-sub.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════
   SCROLL HINT
   ═══════════════════════════════════════════ */
.scroll-hint {
  position: absolute;
  bottom: 2vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  pointer-events: none;
  opacity: 0.45;
  transition: opacity 0.8s ease;
}

.scroll-hint.hidden { opacity: 0; }

.scroll-hint-text {
  font-family: var(--condensed);
  font-weight: 300;
  font-size: 0.42rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.scroll-hint-chevrons {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0px;
}

.scroll-hint-chevrons svg {
  width: 9px;
  height: 9px;
  stroke: var(--accent-red);
  stroke-width: 2;
  fill: none;
  opacity: 0;
  animation: chevPulse 2.2s ease-in-out infinite;
}

.scroll-hint-chevrons svg:nth-child(1) { animation-delay: 0s; }
.scroll-hint-chevrons svg:nth-child(2) { animation-delay: 0.12s; }
.scroll-hint-chevrons svg:nth-child(3) { animation-delay: 0.24s; }

@keyframes chevPulse {
  0%   { opacity: 0; transform: translateY(-2px); }
  25%  { opacity: 0.7; transform: translateY(0); }
  60%  { opacity: 0.7; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(2px); }
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1024px) {
  .cf-card .image-container { width: 70vw; }
  .cf-card[data-pos="left"]  { transform: translateX(-52vw) scale(0.65) rotateY(3deg) translateZ(-100px); }
  .cf-card[data-pos="right"] { transform: translateX(52vw) scale(0.65) rotateY(-3deg) translateZ(-100px); }
  .cf-title { font-size: clamp(2.5rem, 6vw, 4.5rem); }
}
@media (max-width: 768px) {
  .cf-card .image-container { width: 85vw; }
  .cf-card[data-pos="left"]  { transform: translateX(-60vw) scale(0.55) rotateY(2deg); opacity: 0.3; }
  .cf-card[data-pos="right"] { transform: translateX(60vw) scale(0.55) rotateY(-2deg); opacity: 0.3; }
  .cf-title { font-size: 2.8rem; }
  .slide-counter { left: 4vw; }
}
</style>
</head>

      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>

    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   COVERFLOW ENGINE
   ═══════════════════════════════════════════ */
(() => {
  const cards = Array.from(document.querySelectorAll('.cf-card'));
  const titleInner = document.getElementById('cfTitleInner');
  const subEl = document.getElementById('cfSub');
  const progressFill = document.getElementById('progressFill');
  const slideCounter = document.getElementById('slideCounter');
  const hint = document.getElementById('scrollHint');
  const total = cards.length;
  let current = 0;
  let locked = false;
  let scrollAccum = 0;
  let hasScrolled = false;

  const THRESHOLD = 60;
  const LOCK_DURATION = 1500;

  function posMap(active) {
    const m = {};
    for (let i = 0; i < total; i++) {
      const d = ((i - active) % total + total) % total;
      if (d === 0) m[i] = 'center';
      else if (d === 1) m[i] = 'right';
      else if (d === total - 1) m[i] = 'left';
      else if (d === 2) m[i] = 'far-right';
      else m[i] = 'far-left';
    }
    return m;
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function goTo(idx) {
    if (locked) return;
    locked = true;
    scrollAccum = 0;

    current = ((idx % total) + total) % total;
    const map = posMap(current);

    cards.forEach((c, i) => {
      c.setAttribute('data-pos', map[i]);
      c.style.pointerEvents = (map[i] === 'center' || map[i] === 'left' || map[i] === 'right') ? 'auto' : 'none';
    });

    // Title fade
    const activeCard = cards[current];
    titleInner.classList.add('fading');
    subEl.classList.remove('visible');

    setTimeout(() => {
      titleInner.textContent = activeCard.dataset.title;
      titleInner.classList.remove('fading');
      subEl.textContent = activeCard.dataset.sub;
      subEl.classList.add('visible');
    }, 350);

    // Progress bar
    const pct = ((current + 1) / total) * 100;
    progressFill.style.width = pct + '%';

    // Slide counter
    slideCounter.innerHTML = '<span class="current-num">' + pad(current + 1) + '</span> / ' + pad(total);

    // Hide scroll hint
    if (!hasScrolled) {
      hasScrolled = true;
      hint.classList.add('hidden');
    }

    setTimeout(() => { locked = false; }, LOCK_DURATION);
  }

  // ── Wheel ──
  document.addEventListener('wheel', (e) => {
    if (locked) return;
    scrollAccum += e.deltaY;
    if (scrollAccum > THRESHOLD) goTo(current + 1);
    else if (scrollAccum < -THRESHOLD) goTo(current - 1);
  }, { passive: true });

  let resetTimer;
  document.addEventListener('wheel', () => {
    clearTimeout(resetTimer);
    resetTimer = setTimeout(() => { scrollAccum = 0; }, 200);
  }, { passive: true });

  // ── Click side cards ──
  cards.forEach(card => {
    card.addEventListener('click', (e) => {
      const pos = card.getAttribute('data-pos');
      if (pos === 'left') { e.preventDefault(); goTo(current - 1); }
      else if (pos === 'right') { e.preventDefault(); goTo(current + 1); }
    });
  });

  // ── Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft') goTo(current - 1);
  });

  // Init
  goTo(0);
})();

/* ═══════════════════════════════════════════
   DAY/NIGHT MODE
   ═══════════════════════════════════════════ */
if(localStorage.getItem('displayMode')==='day') document.body.classList.add('day-mode');
document.getElementById('modeToggle').addEventListener('click', () => {
  document.body.classList.toggle('day-mode');
  localStorage.setItem('displayMode', document.body.classList.contains('day-mode') ? 'day' : 'night');
});

</script>
