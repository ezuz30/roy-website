<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Projects Timeline — ROY EZUZ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Barlow:wght@100;300;400;600&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM & GLOBALS
   ═══════════════════════════════════════════ */
:root {
  --bg-primary: #0a0a0a;
  --text-primary: #f0f0f2;
  --text-muted: #8a8a92;
  --accent-red: #E32119;
  --border-color: #2a2a2e;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Barlow', sans-serif;
  --condensed: 'Barlow Condensed', sans-serif;
  /* iOS Safari 100vh fix */
  --vh: 1vh;
}

body.day-mode {
  --bg-primary: #ffffff;
  --text-primary: #1a1a1a;
  --text-muted: #999999;
  --border-color: #e0e0e0;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html {
  -webkit-font-smoothing:antialiased;
  cursor:none;
  /* Prevent overscroll bounce on iOS */
  overscroll-behavior: none;
}
body {
  font-family: var(--sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  cursor: none;
  overflow-x: hidden;
  transition: background .4s ease, color .4s ease;
  /* Prevent pull-to-refresh on mobile */
  overscroll-behavior-y: none;
}

/* ═══ CURSOR (desktop only) ═══ */
.cursor-dot { position:fixed; top:0; left:0; width:4px; height:4px; background:var(--accent-red); border-radius:50%; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); transition:width .4s ease, height .4s ease, background .4s ease; will-change:transform; }
.cursor-ring { position:fixed; top:0; left:0; width:15px; height:15px; border:1px solid rgba(227,33,25,.35); border-radius:50%; pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:width .5s ease, height .5s ease, border-color .4s ease; will-change:transform; }
.cursor-dot.on-link { width:3px; height:3px; background:var(--text-primary); }
.cursor-ring.on-link { width:12px; height:12px; border-color:var(--text-muted); }
a, button { cursor:none; }
@media (hover:none) and (pointer:coarse) {
  .cursor-dot, .cursor-ring { display:none !important; }
  html, body, a, button { cursor:auto; }
}

/* ═══ NAV ═══ */
.nav {
  position: fixed; top:0; left:0; right:0; height:90px;
  display: flex; align-items:center; justify-content:space-between;
  padding: 0 6vw; z-index:1000;
  background: transparent;
  transition: background .5s, border-color .5s;
  border-bottom: 1px solid transparent;
}
.nav.solid { background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); border-bottom-color: var(--border-color); }
body.day-mode .nav.solid { background: rgba(255,255,255,0.85); }
.nav-logo { font-family:var(--sans); font-weight:300; font-size:1.1rem; letter-spacing:.3em; text-decoration:none; color:var(--text-primary); }
.nav-logo span { color:var(--accent-red); }
.nav-links { display:flex; gap:3rem; list-style:none; }
.nav-links a { font-family:var(--condensed); font-weight:300; font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; text-decoration:none; color:var(--text-muted); transition:color .3s; }
.nav-links a:hover, .nav-links a.active { color:var(--text-primary); }

/* ═══ TIMELINE — LEFT SIDEBAR ═══ */
.timeline {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 0 0 0 50px;
  pointer-events: auto;
}
.timeline-items {
  position: relative;
  display: flex;
  flex-direction: column;
  width: 100%;
  z-index: 2;
}
.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding: 18px 0;
  cursor: pointer;
  position: relative;
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  opacity: 0.25;
}
.timeline-item:hover { opacity: 0.6; }
.timeline-item.active { opacity: 1; }
.tl-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  margin-top: 5px;
  transition: background 0.5s, box-shadow 0.5s, transform 0.5s;
  position: relative;
}
.timeline-item.active .tl-dot {
  background: var(--accent-red);
  box-shadow: 0 0 18px rgba(227,33,25,0.6), 0 0 40px rgba(227,33,25,0.15);
  transform: scale(1.4);
}
.timeline-item.active .tl-dot::after {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(227,33,25,0.3);
  animation: dotPulse 2s ease-out infinite;
}
@keyframes dotPulse {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}
.tl-text { display: flex; flex-direction: column; gap: 4px; }
.tl-year {
  font-family: var(--condensed);
  font-weight: 500; font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--text-primary);
  line-height: 1;
  transition: color 0.4s;
}
.timeline-item.active .tl-year { color: var(--accent-red); }
.tl-title {
  font-family: var(--serif);
  font-style: italic; font-weight: 400;
  font-size: 0.95rem;
  color: var(--text-muted);
  line-height: 1.2;
  transition: color 0.5s, transform 0.5s;
}
.timeline-item.active .tl-title {
  color: var(--text-primary);
  transform: translateX(3px);
}

/* ═══ WEBGL CANVAS ═══ */
#webgl-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: calc(var(--vh, 1vh) * 100);
  z-index: 5;
  pointer-events: none;
}

/* ═══ TEXT OVERLAY ═══ */
#text-sync-container {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: calc(var(--vh, 1vh) * 100);
  z-index: 10;
  pointer-events: none;
  will-change: transform;
}

.text-section {
  position: absolute;
  width: 100vw;
  height: calc(var(--vh, 1vh) * 100);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 5vw;
}

.huge-title {
  font-family: var(--serif);
  font-size: clamp(3rem, 7vw, 9rem);
  font-weight: 400;
  line-height: 0.9;
  color: #fff;
  text-shadow: 0 10px 40px rgba(0,0,0,0.5);
  margin-bottom: -10px;
}

.project-meta-overlay {
  font-family: var(--sans);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.9);
  text-transform: uppercase;
  margin-bottom: 10px;
  background: rgba(0,0,0,0.2);
  padding: 5px 15px;
  border-radius: 20px;
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
}

/* ═══ SCROLL HINT ═══ */
.scroll-hint {
  position: fixed; bottom: 3.5vh; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  z-index: 100; transition: opacity 0.6s;
}
.scroll-hint.hidden { opacity: 0; pointer-events: none; }
.scroll-hint span { font-family: var(--condensed); font-weight: 300; font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); }
.scroll-mouse { width: 22px; height: 34px; border: 1px solid var(--text-muted); border-radius: 11px; position: relative; }
.scroll-mouse::after { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 2px; height: 6px; background: var(--accent-red); border-radius: 1px; animation: wheel 2s ease-in-out infinite; }
@keyframes wheel { 0% {opacity:1; top:6px;} 50% {opacity:1; top:18px;} 80% {opacity:0; top:22px;} 100% {opacity:0; top:6px;} }

/* ═══ MOBILE INDICATOR DOTS ═══ */
.mobile-dots {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  gap: 12px;
  align-items: center;
  pointer-events: auto;
}
.mobile-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1px solid var(--text-muted);
  background: transparent;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.mobile-dot.active {
  background: var(--accent-red);
  border-color: var(--accent-red);
  transform: scale(1.4);
  box-shadow: 0 0 12px rgba(227,33,25,0.5);
}

/* ═══════════════════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════════════════ */
@media (max-width: 1100px) {
  .timeline { width: 180px; padding-left: 30px; }
  .tl-year { font-size: 1.1rem; }
  .tl-title { font-size: 0.85rem; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — SMALL TABLET / LARGE PHONE
   ═══════════════════════════════════════════ */
@media (max-width: 850px) {
  .timeline { display: none; }
  .mobile-dots { display: flex; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .nav { height: 70px; padding: 0 5vw; }
  .nav-links { display: none; }
  .nav-logo { font-size: 0.95rem; letter-spacing: 0.25em; }

  .huge-title {
    font-size: clamp(2rem, 10vw, 3.5rem);
    text-shadow: 0 6px 25px rgba(0,0,0,0.6);
  }

  .project-meta-overlay {
    font-size: 0.7rem;
    padding: 4px 12px;
    letter-spacing: 0.08em;
  }

  .text-section {
    padding: 0 8vw;
    /* Push text toward lower third so image is more visible */
    justify-content: flex-end;
    padding-bottom: 18vh;
  }

  .scroll-hint { bottom: 2vh; }
  .scroll-hint span { font-size: 0.45rem; }
}

/* ═══════════════════════════════════════════
   RESPONSIVE — SMALL PHONE
   ═══════════════════════════════════════════ */
@media (max-width: 400px) {
  .huge-title {
    font-size: clamp(1.8rem, 11vw, 2.8rem);
  }
  .text-section {
    padding-bottom: 15vh;
  }
}

/* ═══════════════════════════════════════════
   LANDSCAPE MOBILE
   ═══════════════════════════════════════════ */
@media (max-height: 500px) and (orientation: landscape) {
  .huge-title {
    font-size: clamp(1.5rem, 5vh, 2.5rem);
  }
  .text-section {
    justify-content: center;
    padding-bottom: 5vh;
  }
  .nav { height: 55px; }
  .scroll-hint { display: none; }
  .mobile-dots { bottom: 10px; }
}
</style>
<script src="layout.js"></script>
</head>
<body>

<div class="cursor-dot" id="dot"></div>
<div class="cursor-ring" id="ring"></div>

<canvas id="webgl-canvas"></canvas>

<site-nav></site-nav>

<div class="timeline" id="timeline">
  <div class="timeline-items" id="timelineItems"></div>
</div>

<div id="text-sync-container"></div>

<div class="mobile-dots" id="mobileDots"></div>

<div class="scroll-hint" id="scrollHint">
  <div class="scroll-mouse"></div>
  <span>Scroll to Explore</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ═══════════════════════════════════════════
   iOS SAFARI 100vh FIX
   Safari's address bar changes viewport height.
   This sets a CSS variable to the real inner height.
   ═══════════════════════════════════════════ */
function setVH() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
setVH();
window.addEventListener('resize', setVH);
// Also on orientation change (Safari sometimes lags resize)
window.addEventListener('orientationchange', () => {
  setTimeout(setVH, 150);
});

/* ═══════════════════════════════════════════
   DEVICE DETECTION
   ═══════════════════════════════════════════ */
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const isSmallScreen = window.innerWidth <= 850;

/* ═══════════════════════════════════════════
   PROJECT DATA
   ═══════════════════════════════════════════ */
const PROJECTS = [
  {
    year: '2022',
    title: 'Laguna Square',
    meta: 'Venice, Italy',
    image: 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?q=80&w=1200&auto=format&fit=cover',
    url: '#'
  },
  {
    year: '2024',
    title: 'The Narrative Arc',
    meta: 'New York City',
    image: 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?q=80&w=1200&auto=format&fit=cover',
    url: 'nyc_project.html'
  },
  {
    year: '2024',
    title: 'Edge of the World',
    meta: 'Nazaré, Portugal',
    image: 'https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=1200&auto=format&fit=cover',
    url: '#'
  }
];

document.body.style.height = `${PROJECTS.length * 100}vh`;

/* ═══ BUILD DOM ═══ */
const timelineItemsEl = document.getElementById('timelineItems');
const textSyncContainer = document.getElementById('text-sync-container');
const mobileDotsEl = document.getElementById('mobileDots');

PROJECTS.forEach((proj, i) => {
  // Timeline (desktop)
  const item = document.createElement('div');
  item.className = 'timeline-item';
  item.innerHTML = `
    <div class="tl-dot"></div>
    <div class="tl-text">
      <div class="tl-year">${proj.year}</div>
      <div class="tl-title">${proj.title}</div>
    </div>
  `;
  item.addEventListener('click', () => {
    window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
  });
  timelineItemsEl.appendChild(item);

  // Text section
  const textSect = document.createElement('div');
  textSect.className = 'text-section';
  textSect.style.top = `${i * 100}vh`;
  textSect.innerHTML = `
    <div class="project-meta-overlay">${proj.meta}</div>
    <h2 class="huge-title">${proj.title}</h2>
    <a href="${proj.url}" style="pointer-events: auto; margin-top: 25px; font-family: var(--condensed); font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-primary); text-decoration: none; border-bottom: 1px solid var(--accent-red); padding-bottom: 5px; transition: color 0.3s;">Explore Project</a>
  `;
  textSyncContainer.appendChild(textSect);

  // Mobile dots
  const dot = document.createElement('div');
  dot.className = 'mobile-dot';
  dot.addEventListener('click', () => {
    window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
  });
  mobileDotsEl.appendChild(dot);
});

const tlItems = document.querySelectorAll('.timeline-item');
const mobileDots = document.querySelectorAll('.mobile-dot');

/* ═══ WEBGL SHADERS ═══ */
const vertexShader = `
  uniform float uScrollVelocity;
  varying vec2 vUv;

  void main() {
    vUv = uv;
    vec3 pos = position;

    float distFromCenterY = abs(pos.y);
    pos.z += cos(vUv.x * 3.1415 - 1.57) * 0.3;
    pos.z += sin(vUv.y * 3.1415) * uScrollVelocity * 0.05;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

const fragmentShader = `
  uniform sampler2D uTexture;
  uniform float uOpacity;
  varying vec2 vUv;

  void main() {
    vec4 texColor = texture2D(uTexture, vUv);
    float vig = 1.0 - smoothstep(0.5, 1.5, length(vUv - 0.5) * 1.5);
    texColor.rgb *= mix(0.8, 1.0, vig);
    gl_FragColor = vec4(texColor.rgb, uOpacity);
  }
`;

/* ═══ THREE.JS SETUP ═══ */
const canvas = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
// Cap DPR at 2 on mobile for GPU performance
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isTouchDevice ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 6;

// Responsive card sizing
function getCardDimensions() {
  const w = window.innerWidth;
  if (w <= 480) return { w: 4.0, h: 3.0, gap: 4.5 };      // small phone
  if (w <= 768) return { w: 4.8, h: 3.2, gap: 5.0 };      // phone
  if (w <= 1024) return { w: 5.2, h: 3.3, gap: 5.2 };     // tablet
  return { w: 5.53, h: 3.4, gap: 5.5 };                    // desktop
}

let dims = getCardDimensions();

// Lower subdivisions on mobile for GPU performance
const segments = isTouchDevice ? 16 : 32;
const geometry = new THREE.PlaneGeometry(dims.w, dims.h, segments, segments);

const textureLoader = new THREE.TextureLoader();
textureLoader.setCrossOrigin('anonymous');

const meshes = [];

PROJECTS.forEach((proj) => {
  const texture = textureLoader.load(proj.image);
  texture.generateMipmaps = false;
  texture.minFilter = THREE.LinearFilter;

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTexture: { value: texture },
      uScrollVelocity: { value: 0.0 },
      uOpacity: { value: 1.0 }
    },
    transparent: true,
    side: THREE.DoubleSide
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.rotation.z = -0.04;
  scene.add(mesh);
  meshes.push(mesh);
});

/* ═══ MOUSE PARALLAX (desktop only) ═══ */
let targetMouseX = 0;
let targetMouseY = 0;
let currentMouseX = 0;
let currentMouseY = 0;

if (!isTouchDevice) {
  window.addEventListener('mousemove', (e) => {
    targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
    targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });
}

/* ═══ SCROLL & ANIMATION ═══ */
let currentScroll = 0;
let targetScroll = 0;
const scrollHint = document.getElementById('scrollHint');
const nav = document.getElementById('nav');

window.addEventListener('scroll', () => {
  targetScroll = window.scrollY / window.innerHeight;

  if (window.scrollY > 50) {
    scrollHint.classList.add('hidden');
    nav.classList.add('solid');
  } else {
    scrollHint.classList.remove('hidden');
    nav.classList.remove('solid');
  }
}, { passive: true });

function animate() {
  requestAnimationFrame(animate);

  const velocity = targetScroll - currentScroll;
  // Slightly faster lerp on mobile for snappier feel
  const lerpSpeed = isTouchDevice ? 0.10 : 0.08;
  currentScroll += velocity * lerpSpeed;

  // Mouse parallax (desktop only — stays at 0 on touch)
  currentMouseX += (targetMouseX - currentMouseX) * 0.05;
  currentMouseY += (targetMouseY - currentMouseY) * 0.05;

  // Text overlay transform
  const realHeight = window.innerHeight;
  const textTranslateY = -(currentScroll * realHeight);
  const textTranslateX = isTouchDevice ? 0 : currentMouseX * -20;
  const textMouseY = isTouchDevice ? 0 : currentMouseY * -2 * (realHeight / 100);
  textSyncContainer.style.transform = `translateY(${textTranslateY + textMouseY}px) translateX(${textTranslateX}px)`;

  // Active index
  const activeIndex = Math.round(currentScroll);

  // Update timeline (desktop)
  tlItems.forEach((item, idx) => {
    item.classList.toggle('active', idx === activeIndex);
  });

  // Update mobile dots
  mobileDots.forEach((dot, idx) => {
    dot.classList.toggle('active', idx === activeIndex);
  });

  // Update meshes
  const mouseParallaxX = isTouchDevice ? 0 : currentMouseX * 0.15;
  const mouseParallaxY = isTouchDevice ? 0 : currentMouseY * 0.15;
  const mouseRotY = isTouchDevice ? 0 : currentMouseX * 0.05;
  const mouseRotX = isTouchDevice ? 0 : -currentMouseY * 0.05;

  meshes.forEach((mesh, i) => {
    mesh.position.y = (currentScroll - i) * dims.gap + mouseParallaxY;
    mesh.position.x = mouseParallaxX;
    mesh.rotation.y = mouseRotY;
    mesh.rotation.x = mouseRotX;
    mesh.material.uniforms.uScrollVelocity.value = velocity * 15.0;

    const distance = Math.abs(currentScroll - i);
    mesh.material.uniforms.uOpacity.value = Math.max(0, 1.0 - (distance * 0.6));
  });

  renderer.render(scene, camera);
}

animate();

/* ═══ RESIZE HANDLER ═══ */
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Update card dimensions on resize
    const newDims = getCardDimensions();
    if (newDims.w !== dims.w || newDims.h !== dims.h) {
      dims = newDims;
      const newGeo = new THREE.PlaneGeometry(dims.w, dims.h, segments, segments);
      meshes.forEach(mesh => {
        mesh.geometry.dispose();
        mesh.geometry = newGeo;
      });
    }
  }, 100);
});

/* ═══ CUSTOM CURSOR (desktop only) ═══ */
(() => {
  if (isTouchDevice) return;

  const dot = document.getElementById('dot');
  const ring = document.getElementById('ring');
  let mx = -100, my = -100, dx = -100, dy = -100, rx = -100, ry = -100;
  const lerp = (a, b, t) => a + (b - a) * t;
  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  document.querySelectorAll('a, button, .timeline-item').forEach(el => {
    el.addEventListener('mouseenter', () => { dot.classList.add('on-link'); ring.classList.add('on-link'); });
    el.addEventListener('mouseleave', () => { dot.classList.remove('on-link'); ring.classList.remove('on-link'); });
  });

  function animCursor() {
    dx = lerp(dx, mx, .45); dy = lerp(dy, my, .45);
    rx = lerp(rx, mx, .22); ry = lerp(ry, my, .22);
    dot.style.transform = `translate(${dx}px, ${dy}px) translate(-50%,-50%)`;
    ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%,-50%)`;
    requestAnimationFrame(animCursor);
  }
  animCursor();
})();
</script>
