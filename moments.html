  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);

* { margin: 0; padding: 0; box-sizing: border-box; }

}

}

.story-close { position: fixed; top: 1.5rem; right: 1.8rem; z-index: 2020; background: none; border: none; font-family: var(--sans); font-weight: 200; font-size: 2rem; color: rgba(255,255,255,0.5); cursor: none; transition: color 0.3s ease; line-height: 1; padding: 8px; }

/* Scroll indicator */
.scroll-cue { position: fixed; bottom: 3.5vh; left: 2.2rem; z-index: 2008; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
.story-modal.active .scroll-cue { opacity: 0.8; } .scroll-cue.hidden { opacity: 0 !important; }
.scroll-mouse { width: 31px; height: 50px; border: 2px solid rgba(255,255,255,0.95); border-radius: 17px; position: relative; }
.scroll-mouse::after { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 4px; height: 10px; background: var(--accent-red); border-radius: 2px; animation: mouseWheel 2s ease-in-out infinite; }

/* The card */

<h1 class="series-title entrance entrance-d2">M O M E N T S</h1>
<p class="series-description entrance entrance-d3">
    Fleeting intersections of life, gesture, and narrative captured on the street.
  </p>
</div>
<div class="refined-masonry">
<div class="rm-item rm-inset">
<img loading="lazy" alt="Where's Next" data-coords="45.4408° N, 12.3155° E" data-country="Italy" data-location="Venice, Italy" data-story="Venice is the easiest city in the world to photograph. Every canal, every facade, every crack of light through a narrow street is already composed for you — point the camera almost anywhere and you have something to capture. After a few hours of wandering and shooting just for fun, I put the obvious away and started looking for a different kind of frame. In a city like this, I never plan the route. I keep walking, waiting for the photograph to find me. I arrived at a small dock without really deciding to — just following the street until it ran out. There was a couple there, I think, with a boat behind them. The impression I got, from where I was standing, was of two people who had briefly stopped to calculate the next move. The boat probably didn't even belong to them. Venice has a way of doing that — handing you a story that isn't quite yours, and making you want to keep it anyway." data-title="Where's Next" src="images/moments/V_0017_L1067793.jpg"/>
</div>
<div class="rm-item">
<img loading="lazy" alt="Last Train" data-coords="40.7128° N, 74.0060° W" data-country="United States of America" data-location="New York City, USA" data-story="The window between a train arriving and leaving is one of the few moments New York cannot control. The city runs at a pace that does not pause — not for weather, not for time, not for anyone. But on a platform, at that hour, something else takes over. This is where people say goodbye. Maybe for a week. Maybe for longer. You never quite know. What you do know is that time is pushing — and so you reach for one more sign of love, something to carry with you into the solitude on the other side of the door. That, for me, is one of the most human things there is. We are at our best when we drop all the noise aside and surrender to one another. That is the sign that we are participating in this thing called life; we only truly are when we let someone else into ours. And perhaps, that is the only thing that remains true once the train pulls away and the geography between us takes hold again." data-title="Last Train" src="images/moments/L1004849.jpg"/>
</div>
<div class="rm-item">
<img loading="lazy" alt="Nowhere to Be" data-coords="39.4699° N, 0.3763° W" data-country="Spain" data-location="Valencia, Spain" data-story="When was the last time you just stopped — not because you had to, but because you chose to? It sounds easy. It rarely is. Life layers things on you, one by one. Putting them down, even for a moment, takes more intention than most people think. I don't know if he was resting or meditating. The posture suggested the latter. Either way, he had done something most people struggle with: he had decided, in the middle of wherever he was going, to go nowhere. The bike could wait. The route could wait. Everything could wait. That is what I am training myself toward — not the destination, not the pace. The ability to stop on your own terms, and find that you can be everywhere and nowhere, just as you wish. I still have a long way to go." data-title="Nowhere to Be" src="images/moments/H_0001_L104875.jpg"/>
</div>
<div class="rm-item rm-inset">
<img loading="lazy" alt="Drift" data-coords="40.4168° N, 3.7038° W" data-country="Spain" data-location="Madrid, Spain" data-story="Gran Vía is the center of Madrid — loud, busy, always in motion. I was out looking for nothing specific, which is how it almost always works on the street. When you see two young people sleeping on a bench, you start questioning — why here, why now, in the middle of the day, in the middle of the city? Were they traveling and this was the only rest they could find? Did they have a rough night? I had no way of knowing. I pressed the shutter without any preemptive answer. That is what street photography is, for me — collecting questions I never get to finish." data-title="Drift" src="images/moments/L1088161.JPG"/>
</div>
<div class="rm-item">
<img loading="lazy" alt="Against Gravity" data-coords="32.0853° N, 34.7818° E" data-country="Israel" data-location="Tel Aviv, Israel" data-story="I took the camera to Sidni Ali beach in Herzliya looking for something else entirely — the beach is known for its vibrant atmosphere, and for the people who bring their dogs there. It is considered the best known beach for that in Israel. That was the original plan. But these two quite changed it. I don’t think they were together. But whatever they had built between them in that moment was pure chemistry — their work requires perfect balance, patience, and trust. It was blue hour. The light was fading and not in my favour, which meant I had two things working against me at once: the shooting window was closing, and the posture hadn’t reached what I needed. I kept moving — adjusting my position, waiting for everything to align. The legs weren’t straight. The posture wasn’t right. Just before they were calling their day, for one split second, everything came together — and luckily I happened to press the shutter in that moment." data-title="Against Gravity" src="images/moments/L1002161.JPG"/>
</div>
<div class="rm-item rm-inset">
<img loading="lazy" alt="Where the World Ends" data-coords="39.6014° N, 9.0692° W" data-country="Portugal" data-location="Nazaré, Portugal" data-story="I had spent mid-August 2024 driving the Atlantic coast — south from Madrid to Seville, then through the Algarve, north through Cascais and Lisbon, all the way up to Nazaré before turning back toward Porto and home. In the Algarve and Cascais, you go for the sun and a fish meal in front of a calm sea. Nazaré is where you go to witness some of the highest waves on earth. I went there to photograph them. Everyone does — this town is famous for walls of water that have no right to exist. And instead, I come back with this. I was in front of them when I pressed the shutter. I don’t think they noticed I was there — they had found something to hold their attention that had nothing to do with me. Some photographs you go looking for. This one I just received. That is what made it work for me — the background and the foreground doing pretty much the same thing. The ocean stretching outward. The two of them pulling inward. The same feeling, moving in two opposite directions." data-title="Where the World Ends" src="images/moments/L1001160.JPG"/>
</div>
<div class="rm-item rm-inset">
<img loading="lazy" alt="Mid-Sentence" data-coords="40.7128° N, 74.0060° W" data-country="United States of America" data-location="New York City, USA" data-story="Midtown Manhattan runs on a logic of its own — glass towers, everyone mid-task, mid-meeting, mid-thought. Nobody stops. I was out with the camera when I noticed them — right there on the sidewalk, in the middle of all of it. Someone had brought flowers. The city kept moving. They did not. Love has a way of doing that. It does not consult the schedule, the surroundings, or anything the city runs on. Love never waits for the right moment. It arrives mid-sentence, and whatever was left unsaid simply stays that way." data-title="Mid-Sentence" src="images/moments/L1004818.jpg"/>
</div>
<div class="rm-item">
<img loading="lazy" alt="Under the Colors" data-coords="40.4168° N, 3.7038° W" data-country="Spain" data-location="Madrid, Spain" data-story="When you think of Madrid, you probably start with Gran Vía, Puerta del Sol, or Plaza Mayor. There is nothing wrong with that — the famous places are famous for a reason. But Madrid is more than that. Plaza de Colón sits at a different kind of center — a sweet spot on Paseo de Castellana, Madrid's main boulevard, where the noisy streets of Justicia and Chueca on the west meet the elegance of Salamanca and Retiro on the east. That position pulls people from every direction. The kind of place where the city shows all of itself at once. The flag flying above is a statement of pride, honor, and respect — to a nation that sent Cristóbal Colón to discover a new continent on the globe. And below all of that, someone is playing its most beloved game, the one that defines this nation's passion like nothing else. I had the privilege to stay there long enough to stop being a tourist. That kind of connection is not something you visit. It is something you get to build deep inside as the time goes by." data-title="Under the Colors" src="images/moments/V_0003_L1009593.jpg"/>
</div>
<div class="rm-item">
<img loading="lazy" alt="The Frame" data-coords="37.3891° N, 5.9845° W" data-country="Spain" data-location="Seville, Spain" data-story="Andalusia is perhaps the most compelling region to understand what happens when two civilizations share the same soil for long enough. The Islamic influence over Christian culture is not a history lesson here — you see it immediately, in every arch, every courtyard, every shadow. It is the most layered place I have been inside the continent. Plaza de España is one of its grandest expressions. The warm brown of the stone against a clean blue sky turns the whole square into something that feels less like a European plaza and more like a palace carved from sand at the edge of a desert. I came there for the aesthetics. What I found was simpler, and older than any of it — the pull that draws a child back to the person who gave them life. All of that stone and history — and the most powerful thing in the square had nothing to do with either." data-title="The Frame" src="images/moments/seville photo.jpg"/>
</div>

<script>
/* ═══════════════════════════════════════════
   D3 GLOBE
   ═══════════════════════════════════════════ */
const Globe = (() => {
  const W = 220, H = 220;
  const svg = d3.select('#d3Globe');
  const projection = d3.geoOrthographic().scale(105).translate([W/2, H/2]).clipAngle(90);
  const path = d3.geoPath(projection);

  const countryIds = {
    'France': '250', 'Spain': '724', 'United States of America': '840',
    'Germany': '276', 'Italy': '380', 'Portugal': '620', 'Israel': '376',
    'China': '156', 'Mexico': '484'
  };

  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d', path);
  const landGroup = svg.append('g');
  const pinGroup = svg.append('g');

  let worldData = null;
  let ready = false;

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(data => {
    worldData = data;
    const countries = topojson.feature(data, data.objects.countries);
    landGroup.selectAll('path').data(countries.features).join('path').attr('class','land').attr('d', path);
    ready = true;
  }).catch(() => { document.querySelector('.globe-wrap').style.display = 'none'; });

  function rotateTo(lng, lat, country) {
    if (!ready) return;
    const targetRotation = [-lng, -lat];
    const r = d3.interpolate(projection.rotate(), targetRotation);
    const targetId = countryIds[country] || '';

    d3.transition().duration(1200).ease(d3.easeCubicInOut).tween('rotate', () => t => {
      projection.rotate(r(t));
      svg.select('.sphere').attr('d', path);
      const countries = topojson.feature(worldData, worldData.objects.countries);
      landGroup.selectAll('path').data(countries.features).join('path')
        .attr('class', d => d.id === targetId ? 'country-highlight' : 'land').attr('d', path);

      pinGroup.selectAll('*').remove();
      const coords = [lng, lat];
      const p = projection(coords);
      const rot = projection.rotate();
      const dist = d3.geoDistance(
        [coords[0] * Math.PI / 180, coords[1] * Math.PI / 180],
        [-rot[0] * Math.PI / 180, -rot[1] * Math.PI / 180]
      );
      if (p && dist < Math.PI / 2) {
        pinGroup.append('circle').attr('class','globe-pin-ring').attr('cx',p[0]).attr('cy',p[1]).attr('r',6);
        pinGroup.append('circle').attr('class','globe-pin').attr('cx',p[0]).attr('cy',p[1]).attr('r',2.5);
      }
    });
  }
  return { rotateTo };
})();

/* ═══════════════════════════════════════════
   STORY MODAL (Image logic)
   ═══════════════════════════════════════════ */
(() => {
  const modal = document.getElementById('storyModal');
  const track = document.getElementById('storyTrack');
  const closeBtn = document.getElementById('storyClose');
  const storyImg = document.getElementById('storyImage');
  const storyTitle = document.getElementById('storyTitle');
  const storyText = document.getElementById('storyText');
  const locPinText = document.getElementById('storyPinLoc');
  const exifEl = document.getElementById('storyExif');
  const prevBtn = document.getElementById('storyPrev');
  const nextBtn = document.getElementById('storyNext');
  const hints = document.getElementById('storyHints');
  const galleryImages = document.querySelectorAll('.rm-item img');
  const imageArr = Array.from(galleryImages);
  let currentIndex = 0;
  let hintsShown = false;

  function parseCoords(str) {
    if (!str) return { lat: 48, lng: 2 };
    const m = str.match(/([\d.]+)°\s*([NS]),\s*([\d.]+)°\s*([EW])/);
    if (!m) return { lat: 48, lng: 2 };
    let lat = parseFloat(m[1]); if (m[2] === 'S') lat = -lat;
    let lng = parseFloat(m[3]); if (m[4] === 'W') lng = -lng;
    return { lat, lng };
  }

  function loadImage(idx) {
    const img = imageArr[idx];
    const loc = img.dataset.location || '';
    const year = img.dataset.year || '';
    const coords = img.dataset.coords || '';
    const country = img.dataset.country || '';

    storyImg.style.animation = 'none';
    storyImg.offsetHeight;
    storyImg.style.animation = '';

    storyImg.src = img.src;
    storyTitle.textContent = img.dataset.title || 'Untitled';
    storyText.textContent = img.dataset.story || '';
    locPinText.textContent = loc + (year ? ' — ' + year : '');
    exifEl.textContent = img.dataset.exif || '';

    const { lat, lng } = parseCoords(coords);
    Globe.rotateTo(lng, lat, country);

    track.scrollTop = 0;
    const cue = document.getElementById('scrollCue');
    if (cue) cue.classList.remove('hidden');
  }

  imageArr.forEach((img, i) => {
    img.addEventListener('click', () => {
      currentIndex = i; loadImage(i); modal.classList.add('active'); document.body.style.overflow = 'hidden';
      if (!hintsShown) hintsShown = true; else hints.style.display = 'none';
    });
  });

  function closeModal() { modal.classList.remove('active'); document.body.style.overflow = ''; }
  closeBtn.addEventListener('click', closeModal);

  const imageLayer = document.querySelector('.story-image-layer');
  const spacer = document.querySelector('.story-spacer');
  imageLayer.addEventListener('click', (e) => { if (e.target === imageLayer) closeModal(); });
  spacer.addEventListener('click', () => closeModal());
  document.getElementById('storyImage').addEventListener('click', (e) => e.stopPropagation());

  function goNext() { currentIndex = (currentIndex + 1) % imageArr.length; loadImage(currentIndex); }
  function goPrev() { currentIndex = (currentIndex - 1 + imageArr.length) % imageArr.length; loadImage(currentIndex); }
  nextBtn.addEventListener('click', goNext);
  prevBtn.addEventListener('click', goPrev);

  document.addEventListener('keydown', (e) => {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowRight') goNext();
    else if (e.key === 'ArrowLeft') goPrev();
  });

  const scrollCue = document.getElementById('scrollCue');
  track.addEventListener('scroll', () => {
    if (track.scrollTop > 20) scrollCue.classList.add('hidden');
  }, { passive: true });
})();

/* ═══════════════════════════════════════════
   SCROLL REVEAL (Masonry)
   ═══════════════════════════════════════════ */
const initReveal = () => {
  const items = document.querySelectorAll('.rm-item');
  const viewportHeight = window.innerHeight;
  let initialVisible = [];
  let belowFold = [];

  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    if (rect.top < viewportHeight + 100) initialVisible.push({ element: item, top: rect.top, left: rect.left });
    else belowFold.push(item);
  });

  initialVisible.sort((a, b) => {
    const rowTolerance = 150;
    if (Math.abs(a.top - b.top) < rowTolerance) return a.left - b.left;
    return a.top - b.top;
  });

  let delay = 0;
  initialVisible.forEach(itemObj => {
    setTimeout(() => itemObj.element.classList.add('revealed'), delay);
    delay += 180;
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('revealed'), 100);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -50px 0px' });

  belowFold.forEach(item => observer.observe(item));
};

if (document.readyState === 'complete') initReveal();
else window.addEventListener('load', initReveal);
</script>
