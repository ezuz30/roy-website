<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES
   ═══════════════════════════════════════════ */
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a1a1e;
  --text-primary: #f0f0f2;
  --text-secondary: #b0b0b8;
  --text-muted: #8a8a92;
  --border-color: #2a2a2e;
  --shadow-color: rgba(0, 0, 0, 0.6);
  --accent-red: #E32119;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Barlow', Helvetica Neue, sans-serif;
  --condensed: 'Barlow Condensed', Helvetica Neue, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}

::selection { background: var(--accent-red); color: var(--bg-primary); }

/* ═══════════════════════════════════════════
   GALLERY HEADER
   ═══════════════════════════════════════════ */
.gallery-header {
  padding: 140px 5vw 60px;
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
}

.back-link {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-family: var(--condensed); font-weight: 300; font-size: 0.7rem;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  transition: color 0.3s; text-decoration: none;
  position: fixed; top: 140px; right: 4rem;
}

.back-link:hover { color: var(--accent-red); }
.back-link svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.5; }

.series-title {
  font-family: var(--condensed); font-weight: 600; font-size: clamp(2.4rem, 5vw, 4rem);
  letter-spacing: 0.15em; text-transform: uppercase; color: #ffffff; margin-bottom: 1.5rem;
}

.series-description {
  font-family: 'Lora', Georgia, serif; font-weight: 400; font-style: normal;
  font-size: 1.1rem; line-height: 2; letter-spacing: 0.015em;
  color: rgba(255, 255, 255, 0.85); max-width: 600px; margin: 0 auto;
}

/* ═══════════════════════════════════════════
   CINEMATIC REFINED MASONRY
   ═══════════════════════════════════════════ */
.refined-masonry { column-count: 3; column-gap: 3vw; max-width: 1450px; margin: 0 auto; padding: 40px 4vw 120px; }
.rm-item { break-inside: avoid; margin-bottom: 4vw; cursor: none; position: relative; overflow: hidden; opacity: 0; transform: translateY(20px); transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0, 0.2, 1); }
.rm-item.revealed { opacity: 1; transform: translateY(0); }
.rm-item img { width: 100%; height: auto; display: block; transition: transform 0.8s ease, filter 0.6s ease; }
.rm-item:hover img { transform: scale(1.04); filter: brightness(1.08); }
.rm-inset { padding: 0 12%; }

@media (max-width: 1024px) { .refined-masonry { column-count: 2; column-gap: 4vw; } .rm-inset { padding: 0 6%; } }
@media (max-width: 768px) { .refined-masonry { column-count: 1; column-gap: 0; } .rm-inset { padding: 0; } }

/* ═══════════════════════════════════════════
   STORY MODAL (Image Viewer)
   ═══════════════════════════════════════════ */
.story-modal { position: fixed; inset: 0; z-index: 2000; background: #000; opacity: 0; pointer-events: none; visibility: hidden; transition: opacity 0.6s ease, visibility 0s linear 0.6s; }
.story-modal.active { opacity: 1; pointer-events: all; visibility: visible; transition: opacity 0.6s ease, visibility 0s linear 0s; }
.story-close { position: fixed; top: 1.5rem; right: 1.8rem; z-index: 2020; background: none; border: none; font-family: var(--sans); font-weight: 200; font-size: 2rem; color: rgba(255,255,255,0.5); cursor: none; transition: color 0.3s ease; line-height: 1; padding: 8px; }
.story-close:hover { color: #ff2d20; }
.story-image-layer { position: fixed; inset: 0; z-index: 2001; display: flex; align-items: center; justify-content: center; background: #000; padding: 4vh 4vw; pointer-events: none; cursor: none; }
.story-modal.active .story-image-layer { pointer-events: auto; }
.story-image-layer img { max-width: 88vw; max-height: 86vh; width: auto; height: auto; object-fit: contain; display: block; opacity: 0; transform: scale(0.97); transition: opacity 0.8s ease 0.2s, transform 1s cubic-bezier(0.2, 0, 0.2, 1) 0.2s; }
.story-modal.active .story-image-layer img { opacity: 1; transform: scale(1); animation: kenBurns 20s ease-in-out forwards; }
@keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.04); } }

/* Scroll indicator */
.scroll-cue { position: fixed; bottom: 3.5vh; left: 2.2rem; z-index: 2008; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
.story-modal.active .scroll-cue { opacity: 0.8; } .scroll-cue.hidden { opacity: 0 !important; }
.scroll-mouse { width: 31px; height: 50px; border: 2px solid rgba(255,255,255,0.95); border-radius: 17px; position: relative; }
.scroll-mouse::after { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 4px; height: 10px; background: var(--accent-red); border-radius: 2px; animation: mouseWheel 2s ease-in-out infinite; }
@keyframes mouseWheel { 0% { opacity: 1; top: 8px; } 50% { opacity: 1; top: 28px; } 80% { opacity: 0; top: 34px; } 100% { opacity: 0; top: 8px; } }
.scroll-cue-text { font-family: var(--condensed); font-weight: 300; font-size: 0.625rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.95); }

/* EXIF */
.story-exif { font-family: var(--condensed); font-weight: 300; font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase; color: #ededed; margin-top: 1.5rem; text-align: center; }
.story-modal.active .story-exif { opacity: 1; }

.story-arrow { position: fixed; top: 50%; transform: translateY(-50%); z-index: 2008; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: none; opacity: 0; transition: opacity 0.4s ease; pointer-events: none; }
.story-modal.active .story-arrow { opacity: 1; pointer-events: auto; }
.story-arrow svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.2); fill: none; stroke-width: 1.5; transition: stroke 0.3s ease; }
.story-arrow:hover svg { stroke: #ff2d20; }
.story-arrow-prev { left: 1.5rem; } .story-arrow-next { right: 1.5rem; }

/* Keyboard hints */
.story-hints { position: fixed; bottom: 6vh; left: 50%; transform: translateX(-50%); z-index: 2008; display: flex; gap: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.story-modal.active .story-hints { animation: hintAppear 4s ease 1s forwards; }
@keyframes hintAppear { 0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; } }
.hint-item { display: flex; align-items: center; gap: 6px; }
.hint-key { font-family: var(--condensed); font-size: 0.5rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.12); padding: 2px 6px; border-radius: 2px; }
.hint-label { font-family: var(--condensed); font-weight: 300; font-size: 0.45rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.25); }

/* Scroll track */
.story-scroll-track { position: relative; z-index: 2005; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -ms-overflow-style: none; scrollbar-width: none; }
.story-scroll-track::-webkit-scrollbar { display: none; }
.story-spacer { height: 100vh; scroll-snap-align: start; position: relative; pointer-events: none; cursor: none; }
.story-modal.active .story-spacer { pointer-events: auto; }

/* The card */
.story-card { scroll-snap-align: start; background: #0d0d0d; position: relative; border-radius: 16px 16px 0 0; box-shadow: 0 -10px 60px rgba(0,0,0,0.8); }
.story-card::before { content: ''; display: block; width: 40px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 14px auto 0; }
.card-section { min-height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8vh 6vw; text-align: center; }
.card-section + .card-section { border-top: 1px solid rgba(255,255,255,0.04); background: #080808; }

/* Narrative */
.card-narrative { display: grid; grid-template-columns: 1fr 1fr; gap: 6vw; width: 100%; max-width: 1200px; padding: 0 4vw; align-items: start; }
.card-left { padding-top: 2vh; display: flex; flex-direction: column; align-items: center; text-align: center; }
.card-right { padding-top: 2vh; border-left: 1px solid rgba(255,255,255,0.06); padding-left: 4vw; }
.story-title { font-family: var(--condensed); font-weight: 600; font-size: clamp(2.4rem, 5vw, 4rem); text-transform: uppercase; letter-spacing: 0.03em; color: #fff; line-height: 1.05; margin-bottom: 1.8rem; }

.loc-pin { display: flex; align-items: center; gap: 8px; }

.loc-divider { width: 30px; height: 2px; background: #ff2d20; margin-top: 1.5rem; margin-bottom: 1.5rem; }

<script>
/* ═══════════════════════════════════════════
   D3 GLOBE
   ═══════════════════════════════════════════ */
const Globe = (() => {
  const W = 220, H = 220;
  const svg = d3.select('#d3Globe');
  const projection = d3.geoOrthographic().scale(105).translate([W/2, H/2]).clipAngle(90);
  const path = d3.geoPath(projection);

  const countryIds = {
    'France': '250', 'Spain': '724', 'United States of America': '840',
    'Germany': '276', 'Italy': '380', 'Portugal': '620', 'Israel': '376'
  };

  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d', path);
  const landGroup = svg.append('g');
  const pinGroup = svg.append('g');

  let worldData = null;
  let ready = false;

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(data => {
    worldData = data;
    const countries = topojson.feature(data, data.objects.countries);
    landGroup.selectAll('path').data(countries.features).join('path').attr('class','land').attr('d', path);
    ready = true;
  }).catch(() => { document.querySelector('.globe-wrap').style.display = 'none'; });

  function rotateTo(lng, lat, country) {
    if (!ready) return;
    const targetRotation = [-lng, -lat];
    const r = d3.interpolate(projection.rotate(), targetRotation);
    const targetId = countryIds[country] || '';

    d3.transition().duration(1200).ease(d3.easeCubicInOut).tween('rotate', () => t => {
      projection.rotate(r(t));
      svg.select('.sphere').attr('d', path);
      const countries = topojson.feature(worldData, worldData.objects.countries);
      landGroup.selectAll('path').data(countries.features).join('path')
        .attr('class', d => d.id === targetId ? 'country-highlight' : 'land').attr('d', path);

      pinGroup.selectAll('*').remove();
      const coords = [lng, lat];
      const p = projection(coords);
      const rot = projection.rotate();
      const dist = d3.geoDistance(
        [coords[0] * Math.PI / 180, coords[1] * Math.PI / 180],
        [-rot[0] * Math.PI / 180, -rot[1] * Math.PI / 180]
      );
      if (p && dist < Math.PI / 2) {
        pinGroup.append('circle').attr('class','globe-pin-ring').attr('cx',p[0]).attr('cy',p[1]).attr('r',6);
        pinGroup.append('circle').attr('class','globe-pin').attr('cx',p[0]).attr('cy',p[1]).attr('r',2.5);
      }
    });
  }
  return { rotateTo };
})();

/* ═══════════════════════════════════════════
   STORY MODAL (Image logic)
   ═══════════════════════════════════════════ */
(() => {
  const modal = document.getElementById('storyModal');
  const track = document.getElementById('storyTrack');
  const closeBtn = document.getElementById('storyClose');
  const storyImg = document.getElementById('storyImage');
  const storyTitle = document.getElementById('storyTitle');
  const storyText = document.getElementById('storyText');
  const locPinText = document.getElementById('storyPinLoc');
  const exifEl = document.getElementById('storyExif');
  const prevBtn = document.getElementById('storyPrev');
  const nextBtn = document.getElementById('storyNext');
  const hints = document.getElementById('storyHints');
  const galleryImages = document.querySelectorAll('.rm-item img');
  const imageArr = Array.from(galleryImages);
  let currentIndex = 0;
  let hintsShown = false;

  function parseCoords(str) {
    if (!str) return { lat: 48, lng: 2 };
    const m = str.match(/([\d.]+)°\s*([NS]),\s*([\d.]+)°\s*([EW])/);
    if (!m) return { lat: 48, lng: 2 };
    let lat = parseFloat(m[1]); if (m[2] === 'S') lat = -lat;
    let lng = parseFloat(m[3]); if (m[4] === 'W') lng = -lng;
    return { lat, lng };
  }

  function loadImage(idx) {
    const img = imageArr[idx];
    const loc = img.dataset.location || '';
    const year = img.dataset.year || '';
    const coords = img.dataset.coords || '';
    const country = img.dataset.country || '';

    storyImg.style.animation = 'none';
    storyImg.offsetHeight;
    storyImg.style.animation = '';

    storyImg.src = img.src;
    storyTitle.textContent = img.dataset.title || 'Untitled';
    storyText.textContent = img.dataset.story || '';
    locPinText.textContent = loc + (year ? ' — ' + year : '');
    exifEl.textContent = img.dataset.exif || '';

    const { lat, lng } = parseCoords(coords);
    Globe.rotateTo(lng, lat, country);

    track.scrollTop = 0;
    const cue = document.getElementById('scrollCue');
    if (cue) cue.classList.remove('hidden');
  }

  imageArr.forEach((img, i) => {
    img.addEventListener('click', () => {
      currentIndex = i; loadImage(i); modal.classList.add('active'); document.body.style.overflow = 'hidden';
      if (!hintsShown) hintsShown = true; else hints.style.display = 'none';
    });
  });

  function closeModal() { modal.classList.remove('active'); document.body.style.overflow = ''; }
  closeBtn.addEventListener('click', closeModal);

  const imageLayer = document.querySelector('.story-image-layer');
  const spacer = document.querySelector('.story-spacer');
  imageLayer.addEventListener('click', (e) => { if (e.target === imageLayer) closeModal(); });
  spacer.addEventListener('click', () => closeModal());
  document.getElementById('storyImage').addEventListener('click', (e) => e.stopPropagation());

  function goNext() { currentIndex = (currentIndex + 1) % imageArr.length; loadImage(currentIndex); }
  function goPrev() { currentIndex = (currentIndex - 1 + imageArr.length) % imageArr.length; loadImage(currentIndex); }
  nextBtn.addEventListener('click', goNext);
  prevBtn.addEventListener('click', goPrev);

  document.addEventListener('keydown', (e) => {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowRight') goNext();
    else if (e.key === 'ArrowLeft') goPrev();
  });

  const scrollCue = document.getElementById('scrollCue');
  track.addEventListener('scroll', () => {
    if (track.scrollTop > 20) scrollCue.classList.add('hidden');
  }, { passive: true });
})();

/* ═══════════════════════════════════════════
   SCROLL REVEAL (Masonry)
   ═══════════════════════════════════════════ */
const initReveal = () => {
  const items = document.querySelectorAll('.rm-item');
  const viewportHeight = window.innerHeight;
  let initialVisible = [];
  let belowFold = [];

  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    if (rect.top < viewportHeight + 100) initialVisible.push({ element: item, top: rect.top, left: rect.left });
    else belowFold.push(item);
  });

  initialVisible.sort((a, b) => {
    const rowTolerance = 150;
    if (Math.abs(a.top - b.top) < rowTolerance) return a.left - b.left;
    return a.top - b.top;
  });

  let delay = 0;
  initialVisible.forEach(itemObj => {
    setTimeout(() => itemObj.element.classList.add('revealed'), delay);
    delay += 180;
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('revealed'), 100);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -50px 0px' });

  belowFold.forEach(item => observer.observe(item));
};

if (document.readyState === 'complete') initReveal();
else window.addEventListener('load', initReveal);
</script>
